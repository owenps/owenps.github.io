<script>
  (function() {
    var toggle = document.querySelector(".theme-toggle");
    if (!toggle) return;
    function updateGhchart(theme) {
      var chart = document.getElementById("ghchart");
      if (!chart) return;
      var color = theme === "dark" ? "1a6b8a" : "3273dc";
      chart.src = "https://ghchart.rshah.org/" + color + "/owenps";
    }
    function updateIcon() {
      var theme = document.documentElement.getAttribute("data-theme");
      toggle.textContent = theme === "dark" ? "✦" : "✧";
      toggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      updateGhchart(theme);
    }
    updateIcon();
    toggle.addEventListener("click", function() {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      updateIcon();
    });
  })();

  (function() {
    document.addEventListener("click", function(event) {
      var button = event.target.closest && event.target.closest(".codeblock-copy");
      if (!button) return;
      var block = button.closest(".codeblock");
      var code = block && block.querySelector("code");
      if (!code) return;
      navigator.clipboard.writeText(code.textContent.replace(/\n$/, "")).then(function() {
        var toast = document.querySelector(".codeblock-toast");
        if (!toast) {
          toast = document.createElement("div");
          toast.className = "codeblock-toast";
          toast.setAttribute("role", "status");
          toast.setAttribute("aria-live", "polite");
          toast.textContent = "copied to clipboard";
          document.body.appendChild(toast);
        }
        toast.classList.add("show");
        setTimeout(function() { toast.classList.remove("show"); }, 1200);
      });
    });
  })();

</script>
