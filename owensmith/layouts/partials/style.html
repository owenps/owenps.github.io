<style>
  :root {
    --width: 720px;
    --font-main: Verdana, sans-serif;
    --font-secondary: Verdana, sans-serif;
    --font-scale: 1em;
    --background-color: #f5f0e8;
    --heading-color: #2a2420;
    --text-color: #4a4440;
    --link-color: #3273dc;
    --visited-color: #8b6fcb;
    --blockquote-color: #2a2420;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
  }

  blockquote {
    border-left: 1px solid #999;
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .title h2 {
    margin: 0;
  }


  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 6px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
    font-size: 0.9em;
  }

  .highlight pre {
    padding: 1em 1.2em;
    margin: 0;
    border-radius: 6px;
  }

  .codeblock {
    position: relative;
    margin-block-start: 1em;
    margin-block-end: 1em;
  }

  .codeblock .highlight,
  .codeblock pre {
    margin: 0;
    background-color: #101418 !important;
  }

  .codeblock pre {
    border-radius: 6px;
    overflow-x: auto;
    padding: 1em 3.2rem 1em 1.2em;
  }

  .codeblock pre,
  .codeblock code {
    background-color: #101418 !important;
    color: #d6deeb !important;
  }

  .codeblock-copy {
    align-items: center;
    background: transparent;
    border: 1px solid #303844;
    border-radius: 4px;
    color: #d6deeb;
    display: inline-flex;
    padding: 0.35rem;
    position: absolute;
    right: 0.6rem;
    top: 0.6rem;
  }

  .codeblock-copy:hover {
    background: #171d24;
  }

  .codeblock-copy svg {
    height: 1rem;
    width: 1rem;
  }

  .codeblock-toast {
    background: #101418;
    border: 1px solid #303844;
    border-radius: 6px;
    bottom: 1rem;
    color: #d6deeb;
    opacity: 0;
    padding: 0.5rem 0.75rem;
    pointer-events: none;
    position: fixed;
    right: 1rem;
    transition: opacity 0.15s ease;
    z-index: 10;
  }

  .codeblock-toast.show {
    opacity: 1;
  }

  code {
    font-size: 0.9em;
  }

  :not(pre) > code {
    background-color: rgba(0, 0, 0, 0.06);
    padding: 0.2em 0.4em;
    border-radius: 4px;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--visited-color);
  }

  .title-sprite {
    height: 2em;
    vertical-align: middle;
    display: inline;
  }
</style>
